<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stylish Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      color:white;
    }

    header{
      text-align:center;
      padding:25px;
      background:black;
      font-size:24px;
      font-weight:bold;
      letter-spacing:2px;
    }

    .container{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      padding:30px;
      gap:20px;
    }

    .card{
      background:#1f1f1f;
      width:250px;
      border-radius:12px;
      padding:15px;
      text-align:center;
      box-shadow:0 0 10px rgba(255,255,255,0.1);
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card img{
      width:100%;
      border-radius:10px;
    }

    .price{
      font-size:18px;
      margin:10px 0;
      color:#00ffcc;
    }

    .btn{
      background:white;
      color:black;
      padding:10px;
      border:none;
      width:100%;
      cursor:pointer;
      font-weight:bold;
      border-radius:5px;
    }

    .btn:hover{
      background:#00ffcc;
      color:black;
    }

    footer{
      text-align:center;
      padding:20px;
      background:black;
      margin-top:20px;
      font-size:14px;
    }

    .contact{
      color:#00ffcc;
      font-weight:bold;
    }
  </style>
</head>

<body>

<header>
  STYLISH HUB
</header>

<div class="container">

  <!-- Product 1 -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975922284-9f6b3a2b0f08">
    <h3>Premium Shirt</h3>
    <div class="price">₹499</div>
    <a href="https://wa.me/919671141537">
      <button class="btn">Buy Now</button>
    </a>
  </div>

  <!-- Product 2 -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975682031-a8f5f6c7c9b1">
    <h3>Oversized T-Shirt</h3>
    <div class="price">₹599</div>
    <a href="https://wa.me/919671141537">
      <button class="btn">Buy Now</button>
    </a>
  </div>

  <!-- Product 3 -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd49">
    <h3>Casual Hoodie</h3>
    <div class="price">₹999</div>
    <a href="https://wa.me/919671141537">
      <button class="btn">Buy Now</button>
    </a>
  </div>

</div>

<footer>
  Contact: <span class="contact">9671141537</span> <br>
  © 2026 Stylish Hub | All Rights Reserved
</footer>

</body>
</html>
